<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>3D 积木拼搭说明书</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&family=ZCOOL+XiaoWei&display=swap");

    :root {
      --bg-a: #f4efe3;
      --bg-b: #f6dec6;
      --bg-c: #e8f1ea;
      --panel: rgba(255, 251, 244, 0.88);
      --panel-border: rgba(118, 76, 32, 0.22);
      --ink-main: #2e281e;
      --ink-sub: #645744;
      --accent: #c96f2d;
      --accent-strong: #aa5820;
      --accent-soft: #f7e4ce;
      --shadow: 0 12px 34px rgba(58, 41, 20, 0.16);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      color: var(--ink-main);
      font-family: "Manrope", "Segoe UI", "PingFang SC", sans-serif;
      background:
        radial-gradient(55vw 35vw at 14% 14%, rgba(255, 248, 237, 0.9), transparent 70%),
        radial-gradient(65vw 45vw at 84% 88%, rgba(224, 240, 229, 0.8), transparent 72%),
        linear-gradient(145deg, var(--bg-a), var(--bg-b) 48%, var(--bg-c));
    }

    #stage {
      position: fixed;
      inset: 0;
    }

    .is-hidden {
      display: none !important;
    }

    #modelSelect {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: grid;
      place-items: center;
      padding: 18px;
      background:
        radial-gradient(70vw 45vw at 15% 20%, rgba(255, 246, 230, 0.92), transparent 72%),
        radial-gradient(80vw 50vw at 85% 80%, rgba(224, 239, 227, 0.9), transparent 72%),
        linear-gradient(140deg, #f2e8d6, #f6d9bc 46%, #e3eee5);
    }

    .start-panel {
      width: min(760px, calc(100vw - 28px));
      border: 1px solid rgba(118, 76, 32, 0.22);
      border-radius: 18px;
      background: rgba(255, 250, 241, 0.9);
      box-shadow: 0 16px 44px rgba(58, 41, 20, 0.18);
      padding: 18px;
      backdrop-filter: blur(8px);
    }

    .start-title {
      margin: 0;
      font-size: 30px;
      font-family: "ZCOOL XiaoWei", "Times New Roman", serif;
      line-height: 1.2;
      color: #2e281e;
    }

    .start-note {
      margin: 8px 0 14px;
      font-size: 14px;
      color: #675943;
    }

    .model-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .model-btn {
      min-height: 92px;
      text-align: left;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid #e5ceb0;
      background: #fff3e4;
      color: #3a2d1f;
      font-size: 14px;
      line-height: 1.4;
      transition: transform 0.16s ease, border-color 0.2s ease, background-color 0.2s ease;
    }

    .model-btn strong {
      display: block;
      font-size: 16px;
      margin-bottom: 4px;
    }

    .model-btn:hover {
      border-color: #cf915d;
      background: #ffe9d0;
      transform: translateY(-1px);
    }

    .model-btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
      transform: none;
      border-color: #dfd0bc;
      background: #f4ecdf;
    }

    #backToStart {
      position: fixed;
      top: 16px;
      left: 16px;
      z-index: 12;
      width: 56px;
      height: 56px;
      padding: 0;
      border-radius: 999px;
      background: rgba(255, 247, 235, 0.94);
      border: 1px solid #e5c4a0;
      box-shadow: 0 8px 22px rgba(61, 42, 21, 0.14);
      display: grid;
      place-items: center;
    }

    #backToStart svg {
      width: 30px;
      height: 30px;
      display: block;
      stroke: #3a2d1f;
      stroke-width: 3.6;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
    }

    #ui {
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 10;
      width: min(430px, calc(100vw - 28px));
      max-height: calc(100vh - 32px);
      padding: 16px 16px 14px;
      border: 1px solid var(--panel-border);
      border-radius: 16px;
      background: var(--panel);
      backdrop-filter: blur(8px);
      box-shadow: var(--shadow);
      overflow: auto;
      animation: panel-in 520ms cubic-bezier(0.2, 0.8, 0.2, 1) both;
    }

    h1 {
      margin: 0;
      font-size: 26px;
      line-height: 1.15;
      font-family: "ZCOOL XiaoWei", "Times New Roman", serif;
      letter-spacing: 0.3px;
    }

    #stepInfo {
      margin-top: 8px;
      font-size: 13px;
      color: var(--ink-sub);
      font-weight: 700;
      letter-spacing: 0.2px;
    }

    #note {
      display: none;
      margin: 8px 0 12px;
      min-height: 42px;
      font-size: 14px;
      line-height: 1.55;
      color: var(--ink-main);
    }

    .row {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 10px;
    }

    button {
      appearance: none;
      border: 1px solid transparent;
      border-radius: 11px;
      padding: 11px 12px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      color: var(--ink-main);
      background: #fff6ea;
      transition: transform 0.16s ease, background-color 0.2s ease, border-color 0.2s ease;
    }

    button:hover {
      border-color: #e3bf97;
      background: #ffedd8;
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(0);
    }

    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      transform: none;
    }

    button[data-variant="solid"] {
      color: #fff;
      background: var(--accent);
      border-color: rgba(0, 0, 0, 0.08);
    }

    button[data-variant="solid"]:hover {
      background: var(--accent-strong);
    }

    .control-row {
      display: grid;
      grid-template-columns: 120px minmax(0, 1fr);
      gap: 10px;
      margin-bottom: 10px;
      align-items: center;
    }

    .slider-wrap {
      display: flex;
      align-items: center;
      min-width: 0;
    }

    .slider-wrap.is-hidden {
      display: none;
    }

    #pathSlider {
      width: 100%;
      accent-color: var(--accent);
      cursor: pointer;
    }

    #pathSlider:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    #timeline {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .chip {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      text-align: left;
      padding: 8px 10px;
      border-radius: 10px;
      border: 1px solid #ecdcc8;
      background: #fff8ef;
      font-size: 12px;
      color: #4f4334;
      transition: all 0.2s ease;
    }

    .chip.current {
      border-color: #e6a66f;
      background: var(--accent-soft);
      color: #3f2c1a;
    }

    .chip.done {
      border-color: #c3d3b1;
      background: #f4f8ef;
    }

    .chip span {
      font-weight: 700;
    }

    #hint {
      margin: 10px 0 0;
      font-size: 12px;
      color: #7c6f5c;
    }

    @keyframes panel-in {
      from {
        opacity: 0;
        transform: translateY(-10px) scale(0.97);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @media (max-width: 760px) {
      #ui {
        top: auto;
        bottom: 10px;
        left: 10px;
        right: 10px;
        width: auto;
        max-height: 48vh;
        padding: 12px 12px 10px;
      }

      .row {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .model-grid {
        grid-template-columns: repeat(1, minmax(0, 1fr));
      }

      h1 {
        font-size: 22px;
      }

      #stepInfo {
        margin-top: 6px;
      }

      #note {
        display: none;
      }

      #hint {
        display: none;
      }
    }
  </style>
</head>
<body>
  <section id="modelSelect">
    <div class="start-panel">
      <h2 class="start-title">选择拼搭模型</h2>
      <p class="start-note">先选择一个模型进入说明书。</p>
      <div class="model-grid">
        <button class="model-btn" data-model="duck">
          <strong>鸭子</strong>
        </button>
        <button class="model-btn" data-model="horse_easy">
          <strong>马上发（简单）</strong>
        </button>
        <button class="model-btn" data-model="horse_hard">
          <strong>马上发（困难）</strong>
        </button>
      </div>
    </div>
  </section>
  <button id="backToStart" class="is-hidden" type="button" aria-label="返回初始界面" title="返回初始界面">
    <svg viewBox="0 0 24 24" aria-hidden="true">
      <path d="M19 12H6"></path>
      <path d="M11 7L6 12L11 17"></path>
    </svg>
  </button>
  <div id="stage"></div>
  <aside id="ui" class="is-hidden">
    <h1>3D 积木拼搭说明书</h1>
    <div id="stepInfo">步骤 0 / 0</div>
    <div id="note">正在初始化页面...</div>
    <div class="row">
      <button id="prev">上一步</button>
      <button id="next" data-variant="solid">下一步</button>
      <button id="reset">重置</button>
      <button id="auto">自动播放</button>
    </div>
    <div class="control-row">
      <button id="replayCurrent">重来这块</button>
      <div id="pathSliderWrap" class="slider-wrap is-hidden">
        <input id="pathSlider" type="range" min="0" max="100" value="100" step="1" />
      </div>
    </div>
    <div id="timeline"></div>
    <p id="hint">左键拖动旋转，滚轮缩放，WASD / 方向键平移视角。</p>
  </aside>

  <script type="module">
    const stage = document.getElementById("stage");
    const modelSelect = document.getElementById("modelSelect");
    const uiPanel = document.getElementById("ui");
    const btnBackToStart = document.getElementById("backToStart");
    const elStepInfo = document.getElementById("stepInfo");
    const elNote = document.getElementById("note");
    const elTimeline = document.getElementById("timeline");
    const btnPrev = document.getElementById("prev");
    const btnNext = document.getElementById("next");
    const btnReset = document.getElementById("reset");
    const btnAuto = document.getElementById("auto");
    const btnReplayCurrent = document.getElementById("replayCurrent");
    const pathSliderWrap = document.getElementById("pathSliderWrap");
    const pathSlider = document.getElementById("pathSlider");
    const modelButtons = document.querySelectorAll(".model-btn[data-model]");

    const modelCatalog = {
      duck: {
        name: "鸭子",
        folder: "Duck_6pcs",
        fileType: "obj",
        scale: 1,
        modelRotationDeg: [0, 0, 0],
        parts: [
          { id: "grid1_piece6", insertDirection: [1, 0, 0] },
          { id: "grid1_piece5", insertDirection: [-1, 0, 0] },
          { id: "grid1_piece4", insertDirection: [0, 0, 1] },
          { id: "grid1_piece3", insertDirection: [-1, 0, 0] },
          { id: "grid1_piece2", insertDirection: [0, 1, 0] },
          { id: "grid1_piece1", insertDirection: [0, 1, 0] }
        ]
      },
      horse_easy: {
        name: "马上发（简单）",
        folder: "Horse_4pcs",
        fileType: "obj",
        scale: 0.2,
        modelRotationDeg: [-90, 0, 0],
        parts: [
          { id: "grid1_piece2", insertDirection: [1, 0, 0] },
          { id: "grid1_piece3", insertDirection: [-1, 0, 0] },
          { id: "grid1_piece4", insertDirection: [0, 1, 0] },
          { id: "grid1_piece1", insertDirection: [0, 0, -1] }
        ]
      },
      horse_hard: {
        name: "马上发（困难）",
        folder: "Horse_7pcs",
        fileType: "obj",
        scale: 0.2,
        modelRotationDeg: [-90, 0, 0],
        parts: [
          { id: "grid1_piece6", insertDirection: [1, 0, 0] },
          { id: "grid1_piece5", insertDirection: [-1, 0, 0] },
          { id: "grid2_piece1", insertDirection: [0, 0, -1] },
          { id: "grid1_piece4", insertDirection: [0, 0, 1] },
          { id: "grid1_piece3", insertDirection: [0, -1, 0] },
          { id: "grid1_piece2", insertDirection: [0, 1, 0] },
          { id: "grid1_piece1", insertDirection: [0, 0, -1] }
        ]
      }
    };

    function buildPartConfigsFromModel(modelConfig) {
      return modelConfig.parts.map((part, index) => ({
        id: part.id,
        label: `零件 ${index + 1}`,
        note: `沿当前方向插入第 ${index + 1} 块零件。`,
        color: 0xdb7c46,
        insertDirection: part.insertDirection,
        insertDistance: typeof part.insertDistance === "number" ? part.insertDistance : 1.2
      }));
    }

    let activeModel = null;
    let partConfigs = [];
    let assemblyOrder = [];
    let partConfigById = new Map();
    let steps = [];

    const dependencyProviders = [
      {
        name: "unpkg-module",
        three: "https://unpkg.com/three@0.160.0/build/three.module.js?module",
        orbit: "https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js?module",
        obj: "https://unpkg.com/three@0.160.0/examples/jsm/loaders/OBJLoader.js?module",
        stl: "https://unpkg.com/three@0.160.0/examples/jsm/loaders/STLLoader.js?module"
      },
      {
        name: "esm.sh",
        three: "https://esm.sh/three@0.160.0",
        orbit: "https://esm.sh/three@0.160.0/examples/jsm/controls/OrbitControls.js",
        obj: "https://esm.sh/three@0.160.0/examples/jsm/loaders/OBJLoader.js",
        stl: "https://esm.sh/three@0.160.0/examples/jsm/loaders/STLLoader.js"
      },
      {
        name: "jsdelivr-esm",
        three: "https://cdn.jsdelivr.net/npm/three@0.160.0/+esm",
        orbit: "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js/+esm",
        obj: "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/OBJLoader.js/+esm",
        stl: "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/STLLoader.js/+esm"
      }
    ];

    function buildCandidates(partId) {
      if (!activeModel) return [];
      const ext = activeModel.fileType === "stl" ? ".obj.stl" : ".obj";
      return [`./Models/${activeModel.folder}/${partId}${ext}`];
    }

    function getPartById(id) {
      return partConfigById.get(id);
    }

    function updateStaticStatus(step, total, text) {
      elStepInfo.textContent = `步骤 ${step} / ${total}`;
      elNote.textContent = text;
    }

    function buildTimelineSkeleton() {
      const frag = document.createDocumentFragment();
      steps.forEach((step, index) => {
        const chip = document.createElement("button");
        chip.className = "chip";
        chip.type = "button";
        const part = getPartById(step.add?.[0]);
        chip.innerHTML = `<span>步骤 ${index + 1}</span><em>${part?.label ?? "零件"}</em>`;
        chip.disabled = true;
        frag.appendChild(chip);
      });
      elTimeline.replaceChildren(frag);
    }

    async function loadDependencies() {
      let lastError = null;
      for (const provider of dependencyProviders) {
        try {
          console.info(`[deps] trying provider: ${provider.name}`);
          const threeMod = await import(provider.three);
          const orbitMod = await import(provider.orbit);
          const objMod = await import(provider.obj);
          const stlMod = await import(provider.stl);
          if (!orbitMod.OrbitControls || !objMod.OBJLoader || !stlMod.STLLoader) {
            throw new Error(`Provider ${provider.name} returned incomplete modules.`);
          }
          return {
            provider: provider.name,
            THREE: threeMod,
            OrbitControls: orbitMod.OrbitControls,
            OBJLoader: objMod.OBJLoader,
            STLLoader: stlMod.STLLoader
          };
        } catch (err) {
          lastError = err;
          console.warn(`[deps] provider failed: ${provider.name}`, err);
        }
      }
      const message = lastError?.message ? ` Last error: ${lastError.message}` : "";
      throw new Error(`Three.js 依赖加载失败。${message}`);
    }

    async function loadObjWithFallback(loader, partId) {
      const candidates = buildCandidates(partId);
      let lastError = null;

      for (const path of candidates) {
        try {
          const loaded = await loader.loadAsync(path);
          console.info(`[OBJ] loaded: ${path}`);
          return loaded;
        } catch (err) {
          lastError = err;
          console.warn(`[OBJ] failed: ${path}`, err);
        }
      }

      const message = `OBJ 加载失败：${partId}。已尝试：${candidates.join(" , ")}`;
      const err = new Error(message);
      err.cause = lastError;
      throw err;
    }

    async function loadStlWithFallback(loader, partId) {
      const candidates = buildCandidates(partId);
      let lastError = null;

      for (const path of candidates) {
        try {
          const loaded = await loader.loadAsync(path);
          console.info(`[STL] loaded: ${path}`);
          return loaded;
        } catch (err) {
          lastError = err;
          console.warn(`[STL] failed: ${path}`, err);
        }
      }

      const message = `STL 加载失败：${partId}。已尝试：${candidates.join(" , ")}`;
      const err = new Error(message);
      err.cause = lastError;
      throw err;
    }

    function waitForModelSelection() {
      return new Promise(resolve => {
        modelButtons.forEach(button => {
          button.addEventListener("click", () => {
            resolve(button.dataset.model);
          }, { once: true });
        });
      });
    }

    (async function main() {
      const modelFromUrl = new URLSearchParams(location.search).get("model");
      const selectedModel =
        modelFromUrl && modelCatalog[modelFromUrl]
          ? modelFromUrl
          : await waitForModelSelection();
      activeModel = modelCatalog[selectedModel];
      if (!activeModel) return;
      history.replaceState(null, "", `${location.pathname}?model=${encodeURIComponent(selectedModel)}`);

      partConfigs = buildPartConfigsFromModel(activeModel);
      assemblyOrder = activeModel.parts.map(part => part.id);
      partConfigById = new Map(partConfigs.map(part => [part.id, part]));
      steps = assemblyOrder.map((partId, index) => {
        const part = partConfigById.get(partId);
        return {
          add: [partId],
          note: `第 ${index + 1} 步：${part ? part.note : `安装 ${partId}`}`
        };
      });

      updateStaticStatus(0, steps.length, `已选择：${activeModel.name}，正在初始化 3D 引擎...`);
      buildTimelineSkeleton();
      modelSelect.classList.add("is-hidden");
      uiPanel.classList.remove("is-hidden");
      btnBackToStart.classList.remove("is-hidden");

      let deps;
      try {
        deps = await loadDependencies();
        elNote.textContent = `3D 引擎已就绪（${deps.provider}），正在加载模型...`;
      } catch (err) {
        console.error(err);
        updateStaticStatus(0, steps.length, `3D 引擎加载失败：${err.message}`);
        return;
      }

      const THREE = deps.THREE;
      const OrbitControls = deps.OrbitControls;
      const OBJLoader = deps.OBJLoader;
      const STLLoader = deps.STLLoader;
      const sceneConfig = {
        floorY: -5.0,
        gridOffsetY: 0.001,
        assembleDistance: 0.45
      };

      function validateInsertDirectionConfig() {
        for (const part of partConfigs) {
          const dir = part.insertDirection;
          const directionValid =
            Array.isArray(dir) &&
            dir.length === 3 &&
            dir.every(v => typeof v === "number" && Number.isFinite(v));
          if (!directionValid) {
            throw new Error(`零件 ${part.id} 的 insertDirection 无效，必须是 [x, y, z] 数字数组。`);
          }
          const distanceValid = typeof part.insertDistance === "number" && Number.isFinite(part.insertDistance);
          if (!distanceValid) {
            throw new Error(`零件 ${part.id} 的 insertDistance 无效，必须是数字。`);
          }
        }
      }

      function validateAssemblyOrderConfig() {
        const knownIds = new Set(partConfigs.map(part => part.id));
        const seenIds = new Set();

        for (const partId of assemblyOrder) {
          if (!knownIds.has(partId)) {
            throw new Error(`assemblyOrder 中存在未知零件 id：${partId}`);
          }
          if (seenIds.has(partId)) {
            throw new Error(`assemblyOrder 中存在重复零件 id：${partId}`);
          }
          seenIds.add(partId);
        }

        for (const partId of knownIds) {
          if (!seenIds.has(partId)) {
            throw new Error(`assemblyOrder 缺少零件 id：${partId}`);
          }
        }
      }

      validateAssemblyOrderConfig();
      validateInsertDirectionConfig();

      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(46, innerWidth / innerHeight, 0.01, 800);
      camera.position.set(2.2, 1.35, 2.2);

      const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
      renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
      renderer.setSize(innerWidth, innerHeight);
      renderer.shadowMap.enabled = true;
      renderer.shadowMap.type = THREE.PCFSoftShadowMap;
      stage.appendChild(renderer.domElement);

      const controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.dampingFactor = 0.06;
      controls.minDistance = 0.2;
      controls.maxDistance = 20;
      controls.enablePan = true;
      controls.mouseButtons = {
        LEFT: THREE.MOUSE.ROTATE,
        MIDDLE: THREE.MOUSE.DOLLY,
        RIGHT: null
      };
/*
      renderer.domElement.addEventListener("contextmenu", event => {
        event.preventDefault();
      });
      renderer.domElement.addEventListener("pointerdown", event => {
        if (event.button === 2) event.preventDefault();
      }, { passive: false });
      renderer.domElement.addEventListener("auxclick", event => {
        if (event.button === 2) event.preventDefault();
      });
*/
      scene.add(new THREE.AmbientLight(0xffffff, 0.4));

      const hemi = new THREE.HemisphereLight(0xfff4df, 0xd7e3e6, 0.95);
      scene.add(hemi);

      const keyLight = new THREE.DirectionalLight(0xfff2db, 1.0);
      keyLight.position.set(3.3, 4.5, 2.4);
      keyLight.castShadow = true;
      keyLight.shadow.mapSize.set(1024, 1024);
      keyLight.shadow.camera.near = 0.5;
      keyLight.shadow.camera.far = 20;
      keyLight.shadow.bias = -0.00012;
      scene.add(keyLight);

      const fillLight = new THREE.DirectionalLight(0xe8f5ff, 0.45);
      fillLight.position.set(-2.4, 1.8, -1.8);
      scene.add(fillLight);

      const floor = new THREE.Mesh(
        new THREE.CircleGeometry(16, 90),
        new THREE.MeshStandardMaterial({ color: 0xf9f3e8, roughness: 0.96, metalness: 0 })
      );
      floor.receiveShadow = true;
      floor.rotation.x = -Math.PI * 0.5;
      floor.position.y = sceneConfig.floorY;
      scene.add(floor);

      const grid = new THREE.GridHelper(8, 32, 0xd4c1a3, 0xe9dcc8);
      grid.position.y = sceneConfig.floorY + sceneConfig.gridOffsetY;
      if (grid.material && "opacity" in grid.material) {
        grid.material.opacity = 0.65;
        grid.material.transparent = true;
      }
      scene.add(grid);

      const parts = new Map();
      const finalPos = new Map();
      const finalQuat = new Map();
      const animating = new Map();
      const pressedPanKeys = new Set();
      const defaultView = {
        cameraPos: null,
        target: null
      };
      let currentStep = 0;
      let autoTimer = null;
      let currentPathPartId = null;
      let pathControlEnabled = false;

      function clamp(v, min, max) {
        return Math.max(min, Math.min(max, v));
      }

      function easeOutCubic(x) {
        return 1 - Math.pow(1 - x, 3);
      }

      function getVisibleSet(stepIndex) {
        const set = new Set();
        for (let i = 0; i < stepIndex; i += 1) {
          for (const id of (steps[i]?.add ?? [])) {
            set.add(id);
          }
        }
        return set;
      }

      function setHighlight(partId, on) {
        const obj = parts.get(partId);
        if (!obj) return;
        obj.traverse(node => {
          if (!node.isMesh || !node.material || !node.material.isMeshStandardMaterial) return;
          node.material.emissive.setHex(on ? 0xffb347 : 0x000000);
          node.material.emissiveIntensity = on ? 0.34 : 0;
        });
      }

      function clearHighlights() {
        for (const part of partConfigs) {
          setHighlight(part.id, false);
        }
      }

      function getCurrentStepPartId() {
        if (currentStep <= 0) return null;
        return steps[currentStep - 1]?.add?.[0] ?? null;
      }

      function getInsertionPath(partId) {
        const toPos = finalPos.get(partId);
        const partConfig = getPartById(partId);
        if (!toPos || !partConfig) return null;
        const [dx, dy, dz] = partConfig.insertDirection;
        const offset = new THREE.Vector3(dx, dy, dz).multiplyScalar(partConfig.insertDistance);
        return {
          fromPos: toPos.clone().add(offset),
          toPos: toPos.clone()
        };
      }

      function setPartProgressOnPath(partId, progress) {
        const obj = parts.get(partId);
        const path = getInsertionPath(partId);
        if (!obj || !path) return;
        const t = clamp(progress, 0, 1);
        obj.position.lerpVectors(path.fromPos, path.toPos, t);
        setHighlight(partId, t < 1);
      }

      function setPathControlEnabled(enabled) {
        pathControlEnabled = enabled;
        pathSliderWrap.classList.toggle("is-hidden", !enabled);
        pathSlider.disabled = !enabled;
        if (!enabled) pathSlider.value = "100";
      }

      function updateTimeline() {
        const chips = elTimeline.querySelectorAll(".chip");
        chips.forEach((chip, i) => {
          chip.classList.toggle("done", i < currentStep);
          chip.classList.toggle("current", i === currentStep - 1 && currentStep > 0);
          chip.disabled = false;
        });
      }

      function updateStatus() {
        elStepInfo.textContent = `步骤 ${currentStep} / ${steps.length}`;
        if (currentStep === 0) {
          elNote.textContent = "点击“下一步”开始拼搭。";
        } else {
          elNote.textContent = steps[currentStep - 1]?.note ?? "暂无说明";
        }
        btnPrev.disabled = currentStep <= 0;
        btnNext.disabled = currentStep >= steps.length;
        const activePartId = getCurrentStepPartId();
        const canControlPath = Boolean(activePartId);
        btnReplayCurrent.disabled = !canControlPath;
        if (!canControlPath) {
          currentPathPartId = null;
          setPathControlEnabled(false);
        } else if (activePartId !== currentPathPartId) {
          currentPathPartId = activePartId;
          setPathControlEnabled(false);
        }
        updateTimeline();
      }

      function stopAutoPlay() {
        if (autoTimer) {
          clearInterval(autoTimer);
          autoTimer = null;
        }
        btnAuto.textContent = "自动播放";
        btnAuto.dataset.variant = "";
      }

      function animateIn(partId) {
        const obj = parts.get(partId);
        const toPos = finalPos.get(partId);
        const toQuat = finalQuat.get(partId);
        const path = getInsertionPath(partId);
        if (!obj || !toPos || !toQuat || !path) return;

        obj.position.copy(path.fromPos);
        obj.quaternion.copy(toQuat);
        obj.visible = true;
        setHighlight(partId, true);
        animating.set(partId, { t: 0, fromPos: path.fromPos, toPos: path.toPos });
      }

      function goStep(nextStep) {
        const prevStep = currentStep;
        currentStep = clamp(nextStep, 0, steps.length);
        if (currentStep === steps.length) stopAutoPlay();

        const visibleSet = getVisibleSet(currentStep);
        clearHighlights();
        animating.clear();

        for (const [id, obj] of parts.entries()) {
          const visible = visibleSet.has(id);
          obj.visible = visible;
          if (visible) {
            obj.position.copy(finalPos.get(id));
            obj.quaternion.copy(finalQuat.get(id));
          }
        }

        if (currentStep > prevStep && currentStep > 0) {
          const justAdded = steps[currentStep - 1]?.add ?? [];
          justAdded.forEach(animateIn);
        }

        updateStatus();
      }

      function buildTimeline() {
        const frag = document.createDocumentFragment();
        steps.forEach((step, index) => {
          const chip = document.createElement("button");
          chip.className = "chip";
          chip.type = "button";
          const part = getPartById(step.add?.[0]);
          chip.innerHTML = `<span>步骤 ${index + 1}</span><em>${part?.label ?? "零件"}</em>`;
          chip.addEventListener("click", () => {
            stopAutoPlay();
            goStep(index + 1);
          });
          frag.appendChild(chip);
        });
        elTimeline.replaceChildren(frag);
      }

      function fitCameraToAllParts() {
        const box = new THREE.Box3();
        for (const part of parts.values()) {
          box.expandByObject(part);
        }
        if (box.isEmpty()) return;

        const center = box.getCenter(new THREE.Vector3());
        const size = box.getSize(new THREE.Vector3());
        const maxDim = Math.max(size.x, size.y, size.z);
        const radius = Math.max(maxDim * 0.5, 0.15);

        controls.target.copy(center);
        camera.near = Math.max(radius / 150, 0.01);
        camera.far = Math.max(radius * 120, 100);
        camera.updateProjectionMatrix();
        camera.position.copy(center).add(new THREE.Vector3(radius * 2.1, radius * 1.2, radius * 2.05));
        controls.update();

        defaultView.cameraPos = camera.position.clone();
        defaultView.target = controls.target.clone();
      }

      function resetDefaultView() {
        if (!defaultView.cameraPos || !defaultView.target) return;
        camera.position.copy(defaultView.cameraPos);
        controls.target.copy(defaultView.target);
        controls.update();
      }

      async function loadAllParts() {
        const objLoader = new OBJLoader();
        const stlLoader = new STLLoader();
        for (let i = 0; i < partConfigs.length; i += 1) {
          const config = partConfigs[i];
          const candidates = buildCandidates(config.id);
          elNote.textContent = `正在加载 ${i + 1}/${partConfigs.length}：${config.label}`;

          let obj;
          if (activeModel.fileType === "stl") {
            const geometry = await loadStlWithFallback(stlLoader, config.id);
            if (typeof geometry.computeVertexNormals === "function") {
              geometry.computeVertexNormals();
            }
            obj = new THREE.Mesh(
              geometry,
              new THREE.MeshStandardMaterial({
                color: config.color,
                roughness: 0.52,
                metalness: 0.06
              })
            );
            obj.castShadow = true;
            obj.receiveShadow = true;
          } else {
            obj = await loadObjWithFallback(objLoader, config.id);
            obj.traverse(node => {
              if (!node.isMesh) return;
              node.castShadow = true;
              node.receiveShadow = true;
              node.material = new THREE.MeshStandardMaterial({
                color: config.color,
                roughness: 0.52,
                metalness: 0.06
              });
            });
          }
          obj.name = config.id;
          obj.scale.setScalar(activeModel.scale ?? 1);
          const [rxDeg, ryDeg, rzDeg] = activeModel.modelRotationDeg ?? [0, 0, 0];
          obj.rotation.set(
            THREE.MathUtils.degToRad(rxDeg),
            THREE.MathUtils.degToRad(ryDeg),
            THREE.MathUtils.degToRad(rzDeg)
          );

          scene.add(obj);
          parts.set(config.id, obj);
          finalPos.set(config.id, obj.position.clone());
          finalQuat.set(config.id, obj.quaternion.clone());
        }

        fitCameraToAllParts();
        goStep(1);
      }

      function toggleAutoPlay() {
        if (autoTimer) {
          stopAutoPlay();
          return;
        }
        if (currentStep >= steps.length) {
          goStep(0);
        }
        btnAuto.textContent = "暂停播放";
        btnAuto.dataset.variant = "solid";
        autoTimer = setInterval(() => {
          if (currentStep >= steps.length) {
            stopAutoPlay();
            return;
          }
          goStep(currentStep + 1);
        }, 1600);
      }

      function tick() {
        const dt = clock.getDelta();

        const panDir = new THREE.Vector3();
        if (pressedPanKeys.has("w") || pressedPanKeys.has("arrowup")) panDir.y += 1;
        if (pressedPanKeys.has("s") || pressedPanKeys.has("arrowdown")) panDir.y -= 1;
        if (pressedPanKeys.has("a") || pressedPanKeys.has("arrowleft")) panDir.x -= 1;
        if (pressedPanKeys.has("d") || pressedPanKeys.has("arrowright")) panDir.x += 1;

        if (panDir.lengthSq() > 0) {
          panDir.normalize();
          const forward = new THREE.Vector3();
          camera.getWorldDirection(forward);
          const right = new THREE.Vector3().crossVectors(forward, camera.up).normalize();
          const viewUp = new THREE.Vector3().crossVectors(right, forward).normalize();
          const distanceFactor = Math.max(camera.position.distanceTo(controls.target), 0.2);
          const panSpeed = distanceFactor * 1.2 * dt;
          const delta = new THREE.Vector3()
            .addScaledVector(right, panDir.x * panSpeed)
            .addScaledVector(viewUp, panDir.y * panSpeed);
          camera.position.add(delta);
          controls.target.add(delta);
        }

        for (const [id, data] of animating.entries()) {
          data.t += 0.03;
          const k = Math.min(data.t, 1);
          const obj = parts.get(id);
          if (!obj) continue;
          obj.position.lerpVectors(data.fromPos, data.toPos, easeOutCubic(k));
          if (k >= 1) {
            animating.delete(id);
            setHighlight(id, false);
          }
        }
        controls.update();
        renderer.render(scene, camera);
        requestAnimationFrame(tick);
      }

      btnPrev.addEventListener("click", () => {
        stopAutoPlay();
        goStep(currentStep - 1);
      });
      btnNext.addEventListener("click", () => {
        stopAutoPlay();
        goStep(currentStep + 1);
      });
      btnReset.addEventListener("click", () => {
        stopAutoPlay();
        goStep(0);
      });
      btnAuto.addEventListener("click", toggleAutoPlay);
      btnReplayCurrent.addEventListener("click", () => {
        stopAutoPlay();
        const partId = getCurrentStepPartId();
        if (!partId) return;
        currentPathPartId = partId;
        setPathControlEnabled(true);
        pathSlider.value = "0";
        animating.delete(partId);
        setPartProgressOnPath(partId, 0);
      });
      pathSlider.addEventListener("input", () => {
        if (!pathControlEnabled) return;
        const partId = getCurrentStepPartId();
        if (!partId) return;
        stopAutoPlay();
        currentPathPartId = partId;
        animating.delete(partId);
        setPartProgressOnPath(partId, Number(pathSlider.value) / 100);
      });
      btnBackToStart.addEventListener("click", () => {
        stopAutoPlay();
        setPathControlEnabled(false);
        modelSelect.classList.remove("is-hidden");
        uiPanel.classList.add("is-hidden");
        btnBackToStart.classList.add("is-hidden");
      });

      modelButtons.forEach(button => {
        button.addEventListener("click", () => {
          if (button.dataset.model !== selectedModel) {
            stopAutoPlay();
            location.href = `${location.pathname}?model=${encodeURIComponent(button.dataset.model)}`;
            return;
          }
          modelSelect.classList.add("is-hidden");
          uiPanel.classList.remove("is-hidden");
          btnBackToStart.classList.remove("is-hidden");
          resetDefaultView();
        });
      });

      addEventListener("keydown", event => {
        const key = event.key.toLowerCase();
        const tag = event.target?.tagName;
        const editable = tag === "INPUT" || tag === "TEXTAREA" || tag === "SELECT";
        if (editable) return;
        if (!["w", "a", "s", "d", "arrowup", "arrowdown", "arrowleft", "arrowright"].includes(key)) return;
        pressedPanKeys.add(key);
        event.preventDefault();
      });

      addEventListener("keyup", event => {
        const key = event.key.toLowerCase();
        pressedPanKeys.delete(key);
      });

      addEventListener("resize", () => {
        camera.aspect = innerWidth / innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(innerWidth, innerHeight);
      });

      buildTimeline();
      updateStatus();
      const clock = new THREE.Clock();
      tick();

      loadAllParts().catch(err => {
        console.error(err);
        stopAutoPlay();
        const detail = err?.message ? ` 详情：${err.message}` : "";
        elNote.textContent = `模型加载失败，请检查 Models/${activeModel?.folder ?? ""} 路径和文件。${detail}`;
      });
    })();
  </script>
</body>
</html>
